name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: ${{ matrix.scope }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ matrix.scope }}-${{ matrix.check }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # Global checks (lint/type/test across apps and packages via root config)
          - scope: global
            check: lint
            command: npm run lint
          - scope: global
            check: typecheck
            command: npm run typecheck
          - scope: global
            check: test
            command: npm run test

          # Targeted checks for standalone runtimes
          - scope: cli
            check: test
            command: ./node_modules/.bin/vitest run apps/cli

          - scope: worker
            check: lint
            command: npm --prefix apps/worker run lint
          - scope: worker
            check: typecheck
            command: npm --prefix apps/worker run typecheck
          - scope: worker
            check: test
            command: npm --prefix apps/worker run test

          - scope: mcp-gateway
            check: lint
            command: npm --prefix apps/mcp-gateway run lint
          - scope: mcp-gateway
            check: typecheck
            command: npm --prefix apps/mcp-gateway run typecheck
          - scope: mcp-gateway
            check: test
            command: npm --prefix apps/mcp-gateway run test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/worker/package-lock.json
            apps/mcp-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - run: ${{ matrix.command }}
