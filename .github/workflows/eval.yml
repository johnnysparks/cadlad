name: Eval Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'packages/eval/**'
      - 'content/benchmarks/**'
      - 'packages/cad-kernel/**'
      - 'packages/cad-api/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: ./scripts/ci-eval.sh --ci
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infra/eval/eval-logs
          path: infra/eval/eval-logs/
          retention-days: 30
