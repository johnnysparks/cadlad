name: Eval Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'src/eval/**'
      - 'tasks/benchmark/**'
      - 'src/engine/**'
      - 'src/api/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: ./scripts/ci-eval.sh --ci
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-logs
          path: eval-logs/
          retention-days: 30
