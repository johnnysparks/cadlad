name: Deploy Preview to Cloudflare Pages

on:
  push:
    branches-ignore: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: preview-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-worker-preview:
    runs-on: ubuntu-latest
    outputs:
      worker_url: ${{ steps.worker-url.outputs.url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm --prefix worker ci

      - name: Deploy preview live-session Worker
        id: deploy-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --env preview

      - name: Resolve Worker base URL for frontend build
        id: worker-url
        shell: bash
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_WORKER_PREVIEW_URL }}" ]; then
            echo "url=${{ secrets.CLOUDFLARE_WORKER_PREVIEW_URL }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.CLOUDFLARE_WORKER_PRODUCTION_URL }}" ]; then
            echo "url=${{ secrets.CLOUDFLARE_WORKER_PRODUCTION_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "CLOUDFLARE_WORKER_PREVIEW_URL not set; frontend will proxy via Pages Functions (LIVE_SESSION_WORKER_URL in wrangler.toml)." >&2
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages-preview:
    needs: deploy-worker-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build preview site
        env:
          VITE_LIVE_SESSION_API_BASE: ${{ needs.deploy-worker-preview.outputs.worker_url }}
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cadlad --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URLs on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          WORKER_URL: ${{ needs.deploy-worker-preview.outputs.worker_url }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const deployUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const workerUrl = process.env.WORKER_URL;
            const body = [
              `**Preview:** ${deployUrl}`,
              `**Live-session Worker:** ${workerUrl}`
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('**Preview:**')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
