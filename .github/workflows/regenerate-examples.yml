name: Regenerate Example Outputs

on:
  push:
    paths:
      - 'examples/**/model.py'
      - 'regenerate_examples.py'
  pull_request:
    paths:
      - 'examples/**/model.py'
      - 'regenerate_examples.py'
  workflow_dispatch:  # Allow manual triggering

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e ".[rendering]"

      - name: Regenerate example outputs
        run: |
          python regenerate_examples.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet examples/*/render.png examples/*/render.stl || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add examples/*/render.png examples/*/render.stl
          git commit -m "Auto-regenerate example outputs [skip ci]"
          git push

      - name: Comment on PR if changes needed
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Example outputs need regeneration**\n\nThe example model files were modified, but the PNG and STL outputs were not updated.\n\nPlease run:\n```bash\npython regenerate_examples.py\n```\n\nThen commit and push the updated `render.png` and `render.stl` files.'
            })
