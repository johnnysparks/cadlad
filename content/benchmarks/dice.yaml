id: dice
difficulty: 2
description: |
  Model a standard six-sided die as a single 16 mm cube with recessed round pips and no separate parts.
  Place pips so opposite faces sum to 7 (1 opposite 6, 2 opposite 5, 3 opposite 4), using a symmetric quarter-offset grid from each face center.
  Each pip should be a rounded dimple created by subtracting a small sphere (or equivalent rounded cutter) from the face rather than adding raised dots.
reference_prompt: "A professional 3D CAD render of a standard six-sided die, 16mm cube with recessed round pips on all faces. Opposite faces sum to 7. Polished plastic finish, clean rounded dimples, studio lighting, perspective view showing multiple faces."
reference_images: ["content/benchmarks/references/dice.png"]
acceptance:
  body_count: 1
  volume_min: 3200
  volume_max: 6100
  bbox_min: [14, 14, 14]
  bbox_max: [18, 18, 18]
  validation_errors: 0
  has_subtraction: true
api_surface: [box, sphere, subtract, translate, param]
max_iterations: 5
pass_threshold: 70
