<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CadLad — Example Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1e1e2e;
      --bg-surface: #252536;
      --bg-elevated: #2d2d44;
      --text: #cdd6f4;
      --text-muted: #6c7086;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --border: #313244;
    }

    html, body {
      min-height: 100vh;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 24px;
      padding: 24px 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-viewport {
      width: 100%;
      height: 360px;
      background: #181825;
      position: relative;
    }

    .card-viewport canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .card-viewport .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .card-info {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .card-info h2 {
      font-size: 15px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .card-info p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-info details {
      margin-top: 10px;
    }

    .card-info summary {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .card-info summary:hover {
      color: var(--accent);
    }

    .card-info pre {
      margin-top: 8px;
      padding: 10px;
      background: var(--bg-elevated);
      border-radius: 4px;
      overflow-x: auto;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text);
    }

    .error-msg {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f38ba8;
      color: var(--bg);
      padding: 6px 12px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 12px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>CadLad</h1>
    <p>Code-first parametric CAD for TypeScript — example gallery</p>
  </header>
  <div class="gallery" id="gallery"></div>
  <footer>
    <a href="https://github.com/johnnysparks/cadlad">View on GitHub</a>
  </footer>
  <script type="module" src="./main.ts"></script>
</body>
</html>
