# Cloudflare Pages project configuration.
#
# Service bindings wire Pages Functions directly to the Worker with zero latency
# (no HTTP hop). This is the preferred strategy; LIVE_SESSION_WORKER_URL below
# is a fallback for environments where the service binding isn't available.
#
# CadLad uses a single production Worker for all deployments.

name = "cadlad"
pages_build_output_dir = "dist"

[[services]]
binding = "LIVE_SESSION_API"
service = "cadlad-live-sessions"

# HTTP URL fallback (used if service binding is absent)
[vars]
LIVE_SESSION_WORKER_URL = "https://cadlad-live-sessions.johnnymsparks.workers.dev"
