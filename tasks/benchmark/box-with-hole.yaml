id: box-with-hole
difficulty: 1
description: |
  Build a single solid rectangular block that is 40 mm wide (X), 30 mm deep (Y), and 20 mm tall (Z).
  Add one centered through-hole: a vertical cylindrical cut with 10 mm diameter that runs completely through the 20 mm height.
  The hole axis must pass through the center of the top face and continue straight down along Z so the opening is visible on both top and bottom faces.
acceptance:
  body_count: 1
  volume_min: 18800
  volume_max: 35200
  validation_errors: 0
  has_subtraction: true
api_surface: [box, cylinder, subtract, translate]
max_iterations: 3
pass_threshold: 70
