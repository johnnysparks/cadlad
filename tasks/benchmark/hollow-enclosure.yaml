id: hollow-enclosure
difficulty: 4
description: |
  Model a small electronics enclosure as an assembly of two parts: a base box and a flat lid.
  1. Create a 60mm x 40mm x 25mm box for the base.
  2. Use the shell() method to hollow it out with a 2mm wall thickness (leaving the top open).
  3. Create a 60mm x 40mm x 3mm flat lid to sit perfectly on top.
  4. Use assembly() to combine both parts. Give each part a different color.
  5. Add four small 3mm diameter screw pillars inside the corners of the base that rise to the top surface.
reference_prompt: "A professional 3D CAD render of a two-part electronics enclosure assembly, consisting of a hollowed-out base box with four internal screw pillars and a matching flat lid. Contrasting colors for base and lid, technical assembly view, clean plastic surfaces, studio lighting."
reference_images: ["tasks/benchmark/references/hollow-enclosure.png"]
acceptance:
  body_count: 5 # 1 shell + 4 pillars
  assembly: true
  validation_errors: 0
api_surface: [box, shell, assembly, union, translate, color]
max_iterations: 8
pass_threshold: 80
