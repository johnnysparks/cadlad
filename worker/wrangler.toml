name = "cadlad-live-sessions"
main = "src/index.ts"
compatibility_date = "2024-09-25"

# Studio origin used for CORS and liveUrl construction.
# Leave blank to reflect the request Origin dynamically (recommended for shared preview workers).
# Override via `wrangler dev --var STUDIO_ORIGIN:http://localhost:5173`
# or set in the Cloudflare dashboard for production.
[vars]
STUDIO_ORIGIN = ""

[[durable_objects.bindings]]
name = "LIVE_SESSION"
class_name = "LiveSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveSession"]

# KV namespace for OAuth state (clients, link codes, auth codes, tokens)
# and screenshot persistence. Create with:
#   wrangler kv:namespace create "KV"
#   wrangler kv:namespace create "KV" --preview
# Then replace the placeholder IDs below with the real ones.
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

[dev]
port = 8787
local_protocol = "http"

[env.preview]
name = "cadlad-live-sessions-preview"

[env.preview.vars]
STUDIO_ORIGIN = ""

[[env.preview.durable_objects.bindings]]
name = "LIVE_SESSION"
class_name = "LiveSession"

[[env.preview.migrations]]
tag = "v1"
new_sqlite_classes = ["LiveSession"]

[[env.preview.kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"